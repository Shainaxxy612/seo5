<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Meta Tags -->
  <title>陳如雪的鞋子商店</title>
  <meta name="description" content="了解 StrideElite 品牌背後的手工藝傳承與人體工學健康機能。創辦人陳如雪帶領團隊堅持永續環保理念，打造舒適且好穿的鞋履。">
  <meta name="keywords" content="StrideElite, 品牌故事, 陳如雪, 手工製鞋, 綠色永續, 環保鞋">
  <meta name="author" content="StrideElite Co.">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- App Sticky Navbar (Header) -->
  <header class="app-header" id="app-header"></header>

  <!-- Main View Container -->
  <main class="main-content" id="main-content">
    <div style="padding: 100px; text-align: center;">
      <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: var(--primary-gold); margin-bottom: 20px;"></i>
      <h2>載入品牌故事中...</h2>
    </div>
  </main>

  <!-- App Footer -->
  <footer class="app-footer" id="app-footer"></footer>

  <!-- Sidebar Cart Widget -->
  <div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h3><i class="fas fa-shopping-bag" style="color: var(--primary-gold);"></i> 我的購物車</h3>
      <button class="close-cart-btn" id="close-cart-btn" title="關閉購物車">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="cart-items-list" id="cart-items-list"></div>
    <div class="cart-footer">
      <div class="cart-total-row">
        <span class="cart-total-label">總金額 (Subtotal):</span>
        <span class="cart-total-price" id="cart-total-price">0</span>
      </div>
      <button class="btn btn-primary btn-checkout" id="checkout-btn">
        立即前往結帳 <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
      </button>
    </div>
  </div>

  <div class="overlay-backdrop" id="overlay-backdrop"></div>

  <!-- Scripts -->
  <script src="js/products.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const footer = document.getElementById('app-footer');
      if (footer) {
        footer.innerHTML = getFooterHTML();
        const newsletterForm = document.getElementById('newsletter-form');
        if (newsletterForm) {
          newsletterForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = newsletterForm.querySelector('input').value;
            showToast(`感謝訂閱！折扣碼已發送至 ${email}`);
            newsletterForm.reset();
          });
        }
      }
    });
  </script>
</body>
</html>
