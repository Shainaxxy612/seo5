<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Meta Tags -->
  <title>紳士男鞋系列 | StrideElite 邁步精英</title>
  <meta name="description" content="瀏覽 StrideElite 精選男鞋系列，包含專業科技運動跑鞋、經典手工雕花雕紋牛津皮鞋及高防護戶外全地形防水登山靴。">
  <meta name="keywords" content="男鞋, 跑鞋, 皮鞋, 登山靴, 運動鞋, 鋼頭安全鞋, 推薦">
  <meta name="author" content="StrideElite Co.">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- App Sticky Navbar (Header) -->
  <header class="app-header" id="app-header"></header>

  <!-- Main View Container -->
  <main class="main-content" id="main-content">
    <div class="page-view" style="max-width: 1400px; margin: 40px auto; padding: 0 30px;">
      <div class="section-header" style="text-align: left; margin-bottom: 30px;">
        <h2 class="section-title" style="display: block; margin-bottom: 10px;">男鞋系列 (Men's Collection)</h2>
        <p class="section-subtitle" id="product-count-subtitle">為您找到 3 項精選商品</p>
      </div>

      <!-- 商品過濾與搜索欄 -->
      <section class="filter-bar glass-panel">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="product-search-input" placeholder="搜尋商品名稱或特點..." value="">
        </div>
        <div class="filter-options">
          <label for="sort-select" style="font-weight: 600; font-size: 0.9rem;">排序：</label>
          <select id="sort-select" class="filter-select">
            <option value="default" selected>預設推薦</option>
            <option value="price-asc">價格：由低到高</option>
            <option value="price-desc">價格：由高到低</option>
            <option value="rating">顧客評價最高</option>
          </select>
        </div>
      </section>

      <!-- 商品渲染列表 -->
      <div class="products-grid" id="category-products-grid">
        <!-- 商品卡片 1：極光跑鞋 -->
        <div class="product-card glass-panel" data-id="men-runner">
          <span class="badge-tag">優惠中</span>
          <div class="product-img-holder">
            <a href="product.html?id=men-runner">
              <img src="assets/images/men_runner.png" alt="極光炫能專業跑鞋" title="極光炫能專業跑鞋" loading="lazy">
            </a>
          </div>
          <div class="product-meta">
            <div class="product-meta-header">
              <span class="product-cat">男鞋系列</span>
              <span class="product-rating">
                <i class="fas fa-star"></i> 4.9
              </span>
            </div>
            <h3 class="product-card-title">
              <a href="product.html?id=men-runner">極光炫能專業跑鞋 (Aurora Speed Runner)</a>
            </h3>
            <div class="product-card-bottom">
              <div class="price-box">
                <span class="price-original">NT$ 4200</span>
                <span class="price-current">3680</span>
              </div>
              <button class="add-cart-btn add-to-cart-quick" data-id="men-runner" title="加入購物車">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- 商品卡片 2：經典皮鞋 -->
        <div class="product-card glass-panel" data-id="men-oxford">
          <span class="badge-tag">優惠中</span>
          <div class="product-img-holder">
            <a href="product.html?id=men-oxford">
              <img src="assets/images/men_oxford.png" alt="英倫經典典藏雕花皮鞋" title="英倫經典典藏雕花皮鞋" loading="lazy">
            </a>
          </div>
          <div class="product-meta">
            <div class="product-meta-header">
              <span class="product-cat">男鞋系列</span>
              <span class="product-rating">
                <i class="fas fa-star"></i> 4.8
              </span>
            </div>
            <h3 class="product-card-title">
              <a href="product.html?id=men-oxford">英倫經典典藏雕花皮鞋 (Classic Oxford Brogue)</a>
            </h3>
            <div class="product-card-bottom">
              <div class="price-box">
                <span class="price-original">NT$ 5200</span>
                <span class="price-current">4580</span>
              </div>
              <button class="add-cart-btn add-to-cart-quick" data-id="men-oxford" title="加入購物車">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- 商品卡片 3：登山靴 -->
        <div class="product-card glass-panel" data-id="men-hiking">
          <span class="badge-tag">優惠中</span>
          <div class="product-img-holder">
            <a href="product.html?id=men-hiking">
              <img src="assets/images/men_hiking.png" alt="巔峰行者全地形防水登山靴" title="巔峰行者全地形防水登山靴" loading="lazy">
            </a>
          </div>
          <div class="product-meta">
            <div class="product-meta-header">
              <span class="product-cat">男鞋系列</span>
              <span class="product-rating">
                <i class="fas fa-star"></i> 4.7
              </span>
            </div>
            <h3 class="product-card-title">
              <a href="product.html?id=men-hiking">巔峰行者全地形防水登山靴 (Summit Waterproof Boots)</a>
            </h3>
            <div class="product-card-bottom">
              <div class="price-box">
                <span class="price-original">NT$ 5800</span>
                <span class="price-current">4980</span>
              </div>
              <button class="add-cart-btn add-to-cart-quick" data-id="men-hiking" title="加入購物車">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- App Footer -->
  <footer class="app-footer" id="app-footer"></footer>

  <!-- Sidebar Cart Widget -->
  <div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h3><i class="fas fa-shopping-bag" style="color: var(--primary-gold);"></i> 我的購物車</h3>
      <button class="close-cart-btn" id="close-cart-btn" title="關閉購物車">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="cart-items-list" id="cart-items-list"></div>
    <div class="cart-footer">
      <div class="cart-total-row">
        <span class="cart-total-label">總金額 (Subtotal):</span>
        <span class="cart-total-price" id="cart-total-price">0</span>
      </div>
      <button class="btn btn-primary btn-checkout" id="checkout-btn">
        立即前往結帳 <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
      </button>
    </div>
  </div>

  <div class="overlay-backdrop" id="overlay-backdrop"></div>

  <!-- Scripts -->
  <script src="js/products.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const footer = document.getElementById('app-footer');
      if (footer) {
        footer.innerHTML = getFooterHTML();
        const newsletterForm = document.getElementById('newsletter-form');
        if (newsletterForm) {
          newsletterForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = newsletterForm.querySelector('input').value;
            showToast(`感謝訂閱！折扣碼已發送至 ${email}`);
            newsletterForm.reset();
          });
        }
      }
    });
  </script>
</body>
</html>
