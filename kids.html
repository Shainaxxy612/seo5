            <option value="price-asc">價格：由低到高</option>
            <option value="price-desc">價格：由高到低</option>

          </select>

              <img src="assets/images/陳如雪的鞋子商店-彩虹旋風超輕量兒童運動鞋.png" alt="陳如雪的鞋子商店-彩虹旋風超輕量兒童運動鞋" title="陳如雪的鞋子商店-彩虹旋風超輕量兒童運動鞋" loading="lazy">
            </a>
          </div>
          <div class="product-meta">
            <div class="product-meta-header">
              <span class="product-cat">童鞋系列</span>
              <span class="product-rating">
                <i class="fas fa-star"></i> 4.8
              </span>
            </div>
            <h3 class="product-card-title">
              <a href="product.html?id=陳如雪的鞋子商店-彩虹旋風超輕量兒童運動鞋">彩虹旋風超輕量兒童運動鞋 (Rainbow Wind Kids Sneaker)</a>
            </h3>
            <div class="product-card-bottom">
              <div class="price-box">
                <span class="price-original">NT$ 2200</span>
                <span class="price-current">1880</span>
              </div>
              <button class="add-cart-btn add-to-cart-quick" data-id="陳如雪的鞋子商店-彩虹旋風超輕量兒童運動鞋" title="加入購物車">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- 商品卡片 2：歡樂小鴨防水防滑兒童雨鞋 -->
        <div class="product-card glass-panel" data-id="陳如雪的鞋子商店-歡樂小鴨防水防滑兒童雨鞋">
          <span class="badge-tag">優惠中</span>
          <div class="product-img-holder">
            <a href="product.html?id=陳如雪的鞋子商店-歡樂小鴨防水防滑兒童雨鞋">
              <img src="assets/images/陳如雪的鞋子商店-歡樂小鴨防水防滑兒童雨鞋.png" alt="陳如雪的鞋子商店-歡樂小鴨防水防滑兒童雨鞋" title="陳如雪的鞋子商店-歡樂小鴨防水防滑兒童雨鞋" loading="lazy">

          <div class="product-meta">
            <div class="product-meta-header">
              <span class="product-cat">童鞋系列</span>
              <span class="product-rating">
                <i class="fas fa-star"></i> 4.9
              </span>
            </div>
            <h3 class="product-card-title">
              <a href="product.html?id=陳如雪的鞋子商店-歡樂小鴨防水防滑兒童雨鞋">歡樂小鴨防水防滑兒童雨鞋 (Happy Duck Rainboots)</a>
            </h3>
            <div class="product-card-bottom">
              <div class="price-box">
                <span class="price-original">NT$ 1600</span>
                <span class="price-current">1280</span>
              </div>
              <button class="add-cart-btn add-to-cart-quick" data-id="陳如雪的鞋子商店-歡樂小鴨防水防滑兒童雨鞋" title="加入購物車">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- 商品卡片 3：探索學院復古魔鬼氈兒童鞋 -->
        <div class="product-card glass-panel" data-id="陳如雪的鞋子商店-探索學院復古魔鬼氈兒童鞋">
          <span class="badge-tag">優惠中</span>
          <div class="product-img-holder">
            <a href="product.html?id=陳如雪的鞋子商店-探索學院復古魔鬼氈兒童鞋">
              <img src="assets/images/陳如雪的鞋子商店-探索學院復古魔鬼氈兒童鞋.png" alt="陳如雪的鞋子商店-探索學院復古魔鬼氈兒童鞋" title="陳如雪的鞋子商店-探索學院復古魔鬼氈兒童鞋" loading="lazy">

          <div class="product-meta">
            <div class="product-meta-header">
              <span class="product-cat">童鞋系列</span>

            </div>
            <h3 class="product-card-title">

            </h3>

              <div class="price-box">
                <span class="price-original">NT$ 1980</span>
                <span class="price-current">1680</span>
              </div>
              <button class="add-cart-btn add-to-cart-quick" data-id="陳如雪的鞋子商店-探索學院復古魔鬼氈兒童鞋" title="加入購物車">

  <!-- App Footer -->
  <footer class="app-footer" id="app-footer"></footer>

  <!-- Sidebar Cart Widget -->
  <div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h3><i class="fas fa-shopping-bag" style="color: var(--primary-gold);"></i> 我的購物車</h3>
      <button class="close-cart-btn" id="close-cart-btn" title="關閉購物車">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="cart-items-list" id="cart-items-list"></div>
    <div class="cart-footer">
      <div class="cart-total-row">
        <span class="cart-total-label">總金額 (Subtotal):</span>
        <span class="cart-total-price" id="cart-total-price">0</span>
      </div>
      <button class="btn btn-primary btn-checkout" id="checkout-btn">
        立即前往結帳 <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
      </button>
    </div>
  </div>

  <div class="overlay-backdrop" id="overlay-backdrop"></div>

  <!-- Scripts -->
  <script src="js/products.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const footer = document.getElementById('app-footer');
      if (footer) {
        footer.innerHTML = getFooterHTML();
        const newsletterForm = document.getElementById('newsletter-form');
        if (newsletterForm) {
          newsletterForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = newsletterForm.querySelector('input').value;
            showToast(`感謝訂閱！折扣碼已發送至 ${email}`);
            newsletterForm.reset();
          });
        }
      }
    });
  </script>
</body>
</html>
